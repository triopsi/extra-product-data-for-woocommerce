# This workflow updates the plugin assets and readme on WordPress.org when manually triggered.
name: Plugin asset/readme update
on:
  workflow_dispatch:
jobs:
  update_assets_and_readme:
    if: github.repository == 'triopsi/extra-product-data-for-woocommerce'
    name: Push to trunk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: WordPress.org plugin asset/readme update
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SLUG: extra-product-data-for-woocommerce
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          IGNORE_OTHER_FILES: true
